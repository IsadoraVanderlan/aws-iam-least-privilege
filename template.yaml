AWSTemplateFormatVersion: '2010-09-09'
Description: 'Meu Laboratorio de IAM Least Privilege'

Resources:
  AdminUser:
    Type: 'AWS::IAM::User'
    Properties:
      UserName: 'usr-lab-admin'

  ReadOnlyUser:
    Type: 'AWS::IAM::User'
    Properties:
      UserName: 'usr-lab-auditor'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/ReadOnlyAccess'

  LabS3Bucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub 'lab-least-privilege-data-${AWS::AccountId}'

  S3OperatorUser:
    Type: 'AWS::IAM::User'
    Properties:
      UserName: 'usr-lab-s3-operator'
